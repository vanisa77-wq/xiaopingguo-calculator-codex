<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="小蘋果計算機">
  <meta name="theme-color" content="#ead9c4">
  <link rel="apple-touch-icon" href="app-icon.png?v=2">
  <link rel="icon" type="image/png" href="app-icon.png?v=2">
  <title>小蘋果計算機 v2</title>
  <style>
    :root {
      --bg: #fbf6ef;
      --panel: #e8d9c8;
      --panel-soft: #f0dfc8;
      --line: #c4a06c;
      --ink: #3c2815;
      --muted: #9b8066;
      --cream: #fff9f2;
      --gold: #cda06b;
      --green: #a8b99d;
      --green-dark: #28442c;
      --red: #b95243;
      --orange: #be735c;
      --brown: #8c5d35;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--panel);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans TC", "PingFang TC", sans-serif;
      overflow-x: hidden;
      user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 18px max(16px, env(safe-area-inset-bottom));
    }

    .calculator {
      width: min(100%, 430px);
      min-height: calc(100svh - max(26px, env(safe-area-inset-top) + env(safe-area-inset-bottom)));
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      display: none;
      align-items: baseline;
      gap: 10px;
      padding-left: 8px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 800;
      color: #96613c;
    }

    .version {
      font-size: 20px;
      font-weight: 800;
      color: #9b8066;
    }

    .screen {
      height: clamp(315px, 38svh, 372px);
      border: 3px solid var(--line);
      border-radius: 26px;
      background: var(--panel-soft);
      display: flex;
      flex-direction: column;
      padding: 18px 24px 19px;
      overflow: hidden;
    }

    .tape {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 0 16px;
      scrollbar-width: none;
    }

    .tape::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: clamp(15px, 2.1svh, 18px);
      font-weight: 800;
      line-height: 1.45;
      white-space: nowrap;
    }

    .entry {
      border-bottom: 1px solid rgba(128, 102, 78, .18);
      padding: 2px 0 5px;
      display: grid;
      grid-template-columns: minmax(0, auto) auto auto;
      align-items: baseline;
      justify-content: start;
      column-gap: 8px;
    }

    .entry .expr {
      color: #6f543e;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.25;
      text-align: left;
      max-width: calc(100vw - 150px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry .answer {
      color: var(--ink);
      font-size: 21px;
      font-weight: 800;
      line-height: 1.25;
      white-space: nowrap;
    }

    .entry .copied {
      color: #8c6947;
      font-size: 13px;
      font-weight: 700;
      grid-column: 1 / -1;
      min-height: 0;
      text-align: right;
    }

    .entry .copied:empty {
      display: none;
    }

    .entry-badge {
      padding: 2px 8px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      color: #76502f;
      background: rgba(255, 249, 242, .55);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
    }

    .divider {
      height: 2px;
      background: #bfa06b;
      flex: 0 0 auto;
      opacity: .9;
    }

    .input-line {
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      padding-top: 14px;
      padding-bottom: 8px;
      color: var(--ink);
      font-size: clamp(31px, 7svh, 49px);
      font-weight: 700;
      line-height: 1.05;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      flex-wrap: nowrap;
    }

    .cursor {
      width: 4px;
      height: .98em;
      background: var(--ink);
      display: inline-block;
      margin-left: 4px;
      animation: blink 1.05s steps(2, start) infinite;
    }

    .display-text {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .copy-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 36px;
      transition: min-height .18s ease, opacity .18s ease;
    }

    .copy-row.hidden {
      display: none;
    }

    .copy-row:not(.hidden) {
      margin-bottom: 8px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .memory-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      border: 0;
      min-width: 0;
      height: clamp(70px, 8.2svh, 78px);
      border-radius: 18px;
      color: var(--ink);
      background: var(--cream);
      box-shadow: none;
      font: inherit;
      font-size: clamp(34px, 5.6svh, 48px);
      font-weight: 800;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: none;
    }

    .ans,
    .set-x,
    .copy,
    .share-action {
      background: var(--gold);
      color: #fff;
      font-size: clamp(22px, 3.1svh, 27px);
      white-space: nowrap;
    }

    .ans,
    .set-x {
      padding-inline: 4px;
      font-size: clamp(14px, 2svh, 18px);
    }

    .set-x {
      background: #8f9f91;
      color: #fff9f2;
      font-weight: 900;
    }

    .set-x .x-mark {
      font-size: 1.18em;
      font-weight: 950;
    }

    .copy {
      font-weight: 500;
      font-size: clamp(16px, 2.1svh, 19px);
    }

    .share-action {
      background: var(--green);
      color: var(--green-dark);
      font-size: clamp(16px, 2.1svh, 19px);
      font-weight: 700;
    }

    .copy-row button {
      width: auto;
      height: 36px;
      padding-inline: 14px;
      border-radius: 11px;
    }

    .result-badge {
      height: 36px;
      padding-inline: 14px;
      border: 2px solid var(--gold);
      border-radius: 11px;
      color: #76502f;
      background: rgba(255, 249, 242, .55);
      font-size: clamp(16px, 2.1svh, 19px);
      font-weight: 700;
      line-height: 32px;
      white-space: nowrap;
    }

    button[data-dot] {
      padding-bottom: 14px;
    }

    .backspace,
    .paren {
      background: var(--green);
      color: var(--green-dark);
    }

    .backspace {
      font-size: clamp(28px, 4.2svh, 40px);
    }

    .invoice {
      background: #d8c5ac;
      color: var(--ink);
      font-size: clamp(17px, 2.3svh, 21px);
    }

    .tax {
      background: #c8b994;
      color: var(--ink);
      font-size: clamp(17px, 2.3svh, 21px);
    }

    .utility-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .memory-row button,
    .utility-row button {
      height: clamp(64px, 7.5svh, 72px);
      padding-inline: 2px;
      border-radius: 16px;
    }

    .utility-row .paren,
    .utility-row .clear,
    .utility-row .op {
      font-size: clamp(28px, 4.3svh, 40px);
    }

    .clear {
      background: var(--red);
      color: #fff;
    }

    .op {
      background: var(--orange);
      color: #fff;
    }

    .equals {
      background: var(--brown);
      color: #fff;
    }

    .notice {
      min-height: 19px;
      color: #8f5f3c;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    @media (max-width: 390px) {
      body {
        padding-inline: 10px;
      }

      .calculator {
        padding: 28px 24px 26px;
        border-radius: 27px;
        gap: 14px;
      }

      h1 {
        font-size: 28px;
      }

      .version {
        font-size: 18px;
      }

      .screen {
        padding-inline: 20px;
        height: clamp(270px, 36svh, 410px);
      }

      .keypad {
        gap: 10px;
      }

      button {
        border-radius: 16px;
      }
    }

    @media (max-height: 780px) {
      .calculator {
        padding-top: 24px;
        padding-bottom: 22px;
        gap: 12px;
      }

      .screen {
        height: 270px;
      }

      button {
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="小蘋果計算機">
    <header>
      <h1>小蘋果計算機</h1>
      <span class="version">v2</span>
    </header>

    <section class="screen" aria-live="polite">
      <div class="tape" id="tape">
        <div class="empty" id="empty" hidden></div>
      </div>
      <div class="copy-row hidden" id="copyRow"></div>
      <div class="input-line" id="display"><span class="cursor"></span></div>
      <div class="divider"></div>
    </section>

    <section class="keypad" aria-label="計算機按鍵">
      <div class="memory-row">
        <button class="ans" data-ans="round0">ANS 0</button>
        <button class="ans" data-ans="round2">ANS .00</button>
        <button class="ans" data-ans="ceil">ANS ↑</button>
        <button class="set-x" id="setX">設<span class="x-mark">𝒳</span></button>
        <button class="backspace" id="backspace" aria-label="刪除">⌫</button>
      </div>

      <div class="utility-row">
        <button class="paren" id="paren">( )</button>
        <button class="tax" id="tax">5%稅</button>
        <button class="invoice" id="invoice">發票</button>
        <button class="clear" id="clear">AC</button>
        <button class="op" data-op="÷">÷</button>
      </div>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="×">×</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="−">−</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button data-num="00">00</button>
      <button data-num="0">0</button>
      <button data-dot=".">.</button>
      <button class="equals" id="equals">=</button>
    </section>
    <div class="notice" id="notice"></div>
  </main>

  <script>
    const display = document.getElementById("display");
    const tape = document.getElementById("tape");
    const empty = document.getElementById("empty");
    const copyRow = document.getElementById("copyRow");
    const notice = document.getElementById("notice");
    const operators = new Set(["+", "−", "×", "÷"]);
    const xSymbol = "𝒳";

    let expression = "";
    let completedExpression = "";
    let lastAnswer = null;
    let savedX = null;
    let copiedPrincipal = null;
    let invoicePrincipal = null;
    let clearOnNextNumber = false;
    let deleteTimer = null;
    let noticeTimer = null;

    function render() {
      const text = clearOnNextNumber && completedExpression
        ? completedExpression
        : expression || "";
      display.style.fontSize = "";
      display.innerHTML = "";
      const textElement = document.createElement("span");
      textElement.className = "display-text";
      if (text) {
        textElement.textContent = text;
      }
      display.append(textElement);
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      display.append(cursor);
      fitDisplayText(textElement, cursor);
    }

    function fitDisplayText(textElement, cursor) {
      let size = parseFloat(getComputedStyle(display).fontSize);
      const minimumSize = 18;

      while (
        textElement.scrollWidth + cursor.offsetWidth + 8 > display.clientWidth &&
        size > minimumSize
      ) {
        size -= 1;
        display.style.fontSize = `${size}px`;
      }
    }

    function flash(message) {
      notice.textContent = message;
      clearTimeout(noticeTimer);
      noticeTimer = setTimeout(() => {
        notice.textContent = "";
      }, 1800);
    }

    function tokenBeforeCursor() {
      return expression.at(-1) || "";
    }

    function currentNumberChunk() {
      const parts = expression.split(/[+−×÷()𝒳]/);
      return parts.at(-1) || "";
    }

    function isValueToken(token) {
      return /\d/.test(token) || token === "." || token === ")" || token === xSymbol;
    }

    function appendNumber(value) {
      if (clearOnNextNumber) {
        expression = "";
        completedExpression = "";
        invoicePrincipal = null;
        clearOnNextNumber = false;
      }
      const prev = tokenBeforeCursor();
      if (prev === ")" || prev === xSymbol) {
        expression += "×";
      }
      expression += value;
      hideCopyChoices();
      render();
    }

    function appendDot() {
      if (clearOnNextNumber) {
        expression = "";
        completedExpression = "";
        invoicePrincipal = null;
        clearOnNextNumber = false;
      }
      const prev = tokenBeforeCursor();
      if (prev === ")" || prev === xSymbol) {
        expression += "×0.";
      } else if (!currentNumberChunk()) {
        expression += "0.";
      } else if (!currentNumberChunk().includes(".")) {
        expression += ".";
      }
      hideCopyChoices();
      render();
    }

    function appendOperator(op) {
      clearOnNextNumber = false;
      completedExpression = "";
      hideCopyChoices();
      if (!expression) {
        if (op === "−") expression = "−";
        render();
        return;
      }

      const prev = tokenBeforeCursor();
      if (operators.has(prev)) {
        expression = expression.slice(0, -1) + op;
      } else if (prev === "(") {
        if (op === "−") expression += op;
      } else if (prev === xSymbol) {
        expression += op;
      } else {
        expression += op;
      }
      render();
    }

    function smartParen() {
      clearOnNextNumber = false;
      completedExpression = "";
      hideCopyChoices();
      const open = [...expression].filter(ch => ch === "(").length;
      const close = [...expression].filter(ch => ch === ")").length;
      const prev = tokenBeforeCursor();
      const canClose = prev && !operators.has(prev) && prev !== "(" && (
        open > close || (open === close && /[+−]/.test(expression) && !expression.includes("("))
      );

      if (canClose) {
        expression += ")";
      } else {
        if (prev && isValueToken(prev)) {
          expression += "×";
        }
        expression += "(";
      }
      render();
    }

    function backspaceOnce() {
      if (clearOnNextNumber) {
        clearOnNextNumber = false;
      }
      completedExpression = "";
      hideCopyChoices();
      expression = expression.slice(0, -1);
      render();
    }

    function clearInput() {
      expression = "";
      completedExpression = "";
      invoicePrincipal = null;
      clearOnNextNumber = false;
      hideCopyChoices();
      render();
    }

    function normalizeExpression(input) {
      let text = input.replaceAll("−", "-").replaceAll("×", "*").replaceAll("÷", "/");
      if (text.includes(xSymbol)) {
        if (savedX === null) throw new Error("還沒有設定 𝒳");
        text = text.replaceAll(xSymbol, `(${compactNumber(savedX)})`);
      }
      const open = (text.match(/\(/g) || []).length;
      const close = (text.match(/\)/g) || []).length;
      if (close > open) text = "(".repeat(close - open) + text;
      if (open > close) text += ")".repeat(open - close);
      text = text.replace(/([)\d.])\(/g, "$1*(").replace(/\)([\d.])/g, ")*$1");
      return text;
    }

    function tokenize(text) {
      const tokens = [];
      let index = 0;
      while (index < text.length) {
        const ch = text[index];
        if (/\s/.test(ch)) {
          index += 1;
          continue;
        }
        if (/[0-9.]/.test(ch)) {
          let number = ch;
          index += 1;
          while (index < text.length && /[0-9.]/.test(text[index])) {
            number += text[index];
            index += 1;
          }
          if ((number.match(/\./g) || []).length > 1 || number === ".") {
            throw new Error("小數點格式不對");
          }
          tokens.push({ type: "number", value: Number(number) });
          continue;
        }
        if ("+-*/()".includes(ch)) {
          tokens.push({ type: ch });
          index += 1;
          continue;
        }
        throw new Error("算式裡有不能計算的符號");
      }
      return tokens;
    }

    function parseExpression(tokens) {
      let pos = 0;

      function peek() {
        return tokens[pos];
      }

      function consume(type) {
        if (peek()?.type === type) {
          pos += 1;
          return true;
        }
        return false;
      }

      function primary() {
        if (consume("+")) return primary();
        if (consume("-")) return -primary();
        if (consume("(")) {
          const value = additive();
          if (!consume(")")) throw new Error("括號還沒關好");
          return value;
        }
        const token = peek();
        if (!token || token.type !== "number") throw new Error("算式還沒完成");
        pos += 1;
        return token.value;
      }

      function multiplicative() {
        let value = primary();
        while (peek() && (peek().type === "*" || peek().type === "/")) {
          const op = peek().type;
          pos += 1;
          const right = primary();
          if (op === "/" && right === 0) throw new Error("不能除以 0");
          value = op === "*" ? value * right : value / right;
        }
        return value;
      }

      function additive() {
        let value = multiplicative();
        while (peek() && (peek().type === "+" || peek().type === "-")) {
          const op = peek().type;
          pos += 1;
          const right = multiplicative();
          value = op === "+" ? value + right : value - right;
        }
        return value;
      }

      const result = additive();
      if (pos !== tokens.length) throw new Error("算式還沒完成");
      return result;
    }

    function evaluate(input) {
      const normalized = normalizeExpression(input);
      return parseExpression(tokenize(normalized));
    }

    function prettyNumber(value, maxDigits = 12) {
      const rounded = Math.abs(value) < 1e-12 ? 0 : value;
      return Number(rounded.toPrecision(maxDigits)).toLocaleString("en-US", {
        maximumFractionDigits: 10
      });
    }

    function compactNumber(value) {
      return String(Number(value.toPrecision(12)));
    }

    function answerVersions(value) {
      return {
        round0Label: String(Math.round(value)),
        round2Label: Number(value.toFixed(2)).toLocaleString("en-US", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        }),
        ceilLabel: String(Math.ceil(value)),
        round0Value: String(Math.round(value)),
        round2Value: String(Number(value.toFixed(2))),
        ceilValue: String(Math.ceil(value))
      };
    }

    function isIntegerAnswer(value) {
      return Math.abs(value - Math.round(value)) < 1e-10;
    }

    function calculate() {
      if (!expression || operators.has(tokenBeforeCursor()) || tokenBeforeCursor() === "(") {
        flash("算式還沒完成");
        return;
      }

      try {
        const original = expression;
        const result = evaluate(expression);
        if (!Number.isFinite(result)) throw new Error("結果太大了");
        lastAnswer = result;
        invoicePrincipal = result;
        const shown = prettyNumber(result);
        addTapeEntry(original, shown);
        expression = shown.replaceAll(",", "");
        completedExpression = `${original} = ${shown}`;
        clearOnNextNumber = true;
        showCopyChoices(result);
        render();
      } catch (error) {
        flash(error.message || "這題暫時算不出來");
      }
    }

    function scrollTapeToBottom() {
      requestAnimationFrame(() => {
        tape.scrollTop = tape.scrollHeight;
      });
    }

    function useStoredX() {
      if (lastAnswer !== null && clearOnNextNumber) {
        savedX = lastAnswer;
        addTapeEntry(xSymbol, prettyNumber(savedX));
        flash(`已設定 ${xSymbol} = ${prettyNumber(savedX)}`);
        return;
      }

      if (savedX === null) {
        flash(`先算出答案，再按設${xSymbol}`);
        return;
      }

      if (clearOnNextNumber) {
        expression = "";
        completedExpression = "";
        invoicePrincipal = null;
        clearOnNextNumber = false;
      }

      const prev = tokenBeforeCursor();
      if (prev && isValueToken(prev)) {
        expression += "×";
      }
      expression += xSymbol;
      hideCopyChoices();
      render();
    }

    function addTapeEntry(expr, answer, badgeLabel = "") {
      empty.hidden = true;
      const item = document.createElement("article");
      item.className = "entry";
      item.innerHTML = `
        <div class="expr">${escapeHtml(expr)} =</div>
        <div class="answer">${escapeHtml(answer)}</div>
        ${badgeLabel ? `<span class="entry-badge">${escapeHtml(badgeLabel)}</span>` : ""}
        <div class="copied"></div>
      `;
      tape.append(item);
      scrollTapeToBottom();
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[ch]);
    }

    function hideCopyChoices() {
      copyRow.classList.add("hidden");
      copyRow.innerHTML = "";
    }

    function showCopyChoices(value, badgeLabel = "") {
      copyRow.innerHTML = "";
      copyRow.classList.remove("hidden");
      if (badgeLabel) {
        const badge = document.createElement("span");
        badge.className = "result-badge";
        badge.textContent = badgeLabel;
        copyRow.append(badge);
      }
      addCopyButton("複製", compactNumber(value), "single");
      addShareButton();
      scrollTapeToBottom();
    }

    function addCopyButton(label, value, extraClass = "") {
      const button = document.createElement("button");
      button.className = `copy ${extraClass}`.trim();
      button.textContent = label;
      button.addEventListener("click", () => copyText(value));
      copyRow.append(button);
    }

    function addShareButton() {
      const button = document.createElement("button");
      button.className = "share-action";
      button.textContent = "截圖";
      button.addEventListener("click", shareCalculationImage);
      copyRow.append(button);
    }

    function drawRoundedRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    async function shareCalculationImage() {
      const formula = clearOnNextNumber && completedExpression
        ? completedExpression
        : expression;
      if (!formula) {
        flash("請先完成一題計算");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 630;
      const context = canvas.getContext("2d");
      const badgeLabel = copyRow.querySelector(".result-badge")?.textContent || "";

      context.fillStyle = "#e8d9c8";
      context.fillRect(0, 0, canvas.width, canvas.height);

      drawRoundedRect(context, 55, 55, 1090, 520, 42);
      context.fillStyle = "#f0dfc8";
      context.fill();
      context.lineWidth = 8;
      context.strokeStyle = "#c4a06c";
      context.stroke();

      context.fillStyle = "#765f4c";
      context.font = '700 42px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif';
      context.textAlign = "left";
      context.fillText("小蘋果計算機", 105, 140);

      if (badgeLabel) {
        context.font = '700 30px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif';
        const badgeWidth = context.measureText(badgeLabel).width + 54;
        drawRoundedRect(context, 1095 - badgeWidth, 95, badgeWidth, 58, 18);
        context.fillStyle = "#fff9f2";
        context.fill();
        context.lineWidth = 4;
        context.strokeStyle = "#cda06b";
        context.stroke();
        context.fillStyle = "#76502f";
        context.textAlign = "center";
        context.fillText(badgeLabel, 1095 - badgeWidth / 2, 135);
      }

      context.strokeStyle = "#c4a06c";
      context.lineWidth = 3;
      context.beginPath();
      context.moveTo(105, 185);
      context.lineTo(1095, 185);
      context.stroke();

      let fontSize = 80;
      context.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif`;
      while (context.measureText(formula).width > 990 && fontSize > 34) {
        fontSize -= 2;
        context.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif`;
      }
      context.fillStyle = "#3c2815";
      context.textAlign = "center";
      context.fillText(formula, 600, 365);

      context.fillStyle = "#9b8066";
      context.font = '500 28px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif';
      context.fillText("計算結果", 600, 500);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
      if (!blob) {
        flash("圖片產生失敗，請再試一次");
        return;
      }

      const file = new File([blob], "小蘋果計算結果.png", { type: "image/png" });
      try {
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: "小蘋果計算結果", text: formula });
        } else if (navigator.share) {
          await navigator.share({ title: "小蘋果計算結果", text: formula });
        } else {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = file.name;
          link.click();
          URL.revokeObjectURL(link.href);
          flash("算式圖片已儲存");
        }
      } catch (error) {
        if (error.name !== "AbortError") {
          flash("無法分享，請再試一次");
        }
      }
    }

    async function copyText(text) {
      const numericValue = Number(text);
      if (Number.isFinite(numericValue)) {
        copiedPrincipal = numericValue;
        invoicePrincipal = numericValue;
      }

      try {
        await navigator.clipboard.writeText(text);
        flash(`已複製 ${text}`);
      } catch {
        flash("請長按答案手動複製");
      }
    }

    function getInvoiceAmounts() {
      const directInput = expression.replaceAll(",", "").replace("−", "-").trim();
      const hasDirectAmount = !clearOnNextNumber && /^-?\d+(?:\.\d+)?$/.test(directInput);
      const principal = hasDirectAmount
        ? Number(directInput)
        : invoicePrincipal ?? copiedPrincipal;

      if (principal === null || !Number.isFinite(principal)) {
        flash("請直接輸入金額，或先按複製");
        return null;
      }

      invoicePrincipal = principal;
      const tax = Math.round(principal * 0.05 + Number.EPSILON);
      const total = Math.round((principal + tax + Number.EPSILON) * 100) / 100;
      return {
        principal,
        tax,
        total,
        principalShown: prettyNumber(principal),
        taxShown: prettyNumber(tax),
        totalShown: prettyNumber(total)
      };
    }

    function showCalculatedAmount(value, formula, message, badgeLabel) {
      lastAnswer = value;
      expression = compactNumber(value);
      completedExpression = formula;
      clearOnNextNumber = true;
      showCopyChoices(value, badgeLabel);
      render();
      flash(message);
    }

    function calculateTax() {
      const amounts = getInvoiceAmounts();
      if (!amounts) return;

      const formula = `${amounts.principalShown} × 5% = ${amounts.taxShown}`;
      addTapeEntry(`${amounts.principalShown} × 5%`, amounts.taxShown, "稅金");
      showCalculatedAmount(amounts.tax, formula, `5%稅金 ${amounts.taxShown}`, "稅金");
    }

    function calculateInvoice() {
      const amounts = getInvoiceAmounts();
      if (!amounts) return;

      const formula = `${amounts.principalShown} + ${amounts.taxShown} = ${amounts.totalShown}`;
      addTapeEntry(
        `${amounts.principalShown} + ${amounts.taxShown}`,
        amounts.totalShown,
        "發票"
      );
      showCalculatedAmount(amounts.total, formula, `發票總額 ${amounts.totalShown}`, "發票");
    }

    function useAnswer(mode) {
      if (lastAnswer === null) {
        flash("先算一題才有 ANS");
        return;
      }
      const versions = answerVersions(lastAnswer);
      expression = mode === "round2" ? versions.round2Value : mode === "round0" ? versions.round0Value : versions.ceilValue;
      clearOnNextNumber = false;
      showCopyChoices(Number(expression));
      render();
    }

    document.querySelectorAll("[data-num]").forEach(button => {
      button.addEventListener("click", () => appendNumber(button.dataset.num));
    });

    document.querySelector("[data-dot]").addEventListener("click", appendDot);

    document.querySelectorAll("[data-op]").forEach(button => {
      button.addEventListener("click", () => appendOperator(button.dataset.op));
    });

    document.querySelectorAll("[data-ans]").forEach(button => {
      button.addEventListener("click", () => useAnswer(button.dataset.ans));
    });

    document.getElementById("paren").addEventListener("click", smartParen);
    document.getElementById("tax").addEventListener("click", calculateTax);
    document.getElementById("invoice").addEventListener("click", calculateInvoice);
    document.getElementById("setX").addEventListener("click", useStoredX);
    document.getElementById("clear").addEventListener("click", clearInput);
    document.getElementById("equals").addEventListener("click", calculate);

    document.querySelector(".keypad").addEventListener("contextmenu", event => {
      event.preventDefault();
    });
    document.querySelector(".keypad").addEventListener("selectstart", event => {
      event.preventDefault();
    });

    const backspace = document.getElementById("backspace");
    backspace.addEventListener("click", backspaceOnce);
    backspace.addEventListener("pointerdown", () => {
      clearTimeout(deleteTimer);
      deleteTimer = setTimeout(() => {
        deleteTimer = setInterval(backspaceOnce, 75);
      }, 420);
    });
    ["pointerup", "pointerleave", "pointercancel"].forEach(eventName => {
      backspace.addEventListener(eventName, () => {
        clearTimeout(deleteTimer);
        clearInterval(deleteTimer);
        deleteTimer = null;
      });
    });

    document.addEventListener("keydown", event => {
      const key = event.key;
      if (/^\d$/.test(key)) appendNumber(key);
      if (key === ".") appendDot();
      if (key === "+") appendOperator("+");
      if (key === "-") appendOperator("−");
      if (key === "*") appendOperator("×");
      if (key === "/") appendOperator("÷");
      if (key === "(" || key === ")") smartParen();
      if (key.toLowerCase() === "x") useStoredX();
      if (key === "Backspace") backspaceOnce();
      if (key === "Enter" || key === "=") calculate();
      if (key === "Escape") clearInput();
    });

    render();
  </script>
</body>
</html>
